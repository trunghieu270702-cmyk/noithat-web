<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Pattern sọc chéo nhỏ để điền vào các khối -->
    <pattern id="hatch" width="10" height="10" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#D3AE3E" stroke-width="0.2" opacity="0.3" />
    </pattern>
  </defs>

  <g stroke="#D3AE3E" fill="none" opacity="0.12">
    <!-- Cột chính (Verticals) -->
    <line x1="450" y1="-200" x2="450" y2="1200" stroke-width="1.5" />
    <line x1="480" y1="-200" x2="480" y2="1200" stroke-width="0.5" />
    <line x1="550" y1="-200" x2="550" y2="1200" stroke-width="1.5" />
    <line x1="520" y1="-200" x2="520" y2="1200" stroke-width="0.5" />
    
    <line x1="200" y1="-200" x2="200" y2="1200" stroke-width="0.5" />
    <line x1="800" y1="-200" x2="800" y2="1200" stroke-width="0.5" />
    
    <!-- Các đường dọc phụ mảnh hơn -->
    <line x1="250" y1="-200" x2="250" y2="1200" stroke-width="0.2" />
    <line x1="300" y1="-200" x2="300" y2="1200" stroke-width="0.2" />
    <line x1="700" y1="-200" x2="700" y2="1200" stroke-width="0.2" />
    <line x1="750" y1="-200" x2="750" y2="1200" stroke-width="0.2" />

    <!-- Mặt phẳng chéo (Phối cảnh trái) -->
    <line x1="-100" y1="500" x2="450" y2="200" stroke-width="1" />
    <line x1="-100" y1="550" x2="450" y2="250" stroke-width="0.5" />
    <line x1="-100" y1="700" x2="450" y2="400" stroke-width="1" />
    <line x1="-100" y1="750" x2="450" y2="450" stroke-width="0.5" />
    <line x1="-100" y1="900" x2="450" y2="600" stroke-width="0.5" />
    
    <!-- Mặt phẳng chéo (Phối cảnh phải) -->
    <line x1="550" y1="200" x2="1100" y2="500" stroke-width="1" />
    <line x1="550" y1="250" x2="1100" y2="550" stroke-width="0.5" />
    <line x1="550" y1="400" x2="1100" y2="700" stroke-width="1" />
    <line x1="550" y1="450" x2="1100" y2="750" stroke-width="0.5" />
    <line x1="550" y1="600" x2="1100" y2="900" stroke-width="0.5" />

    <!-- Một số khối ban công hoặc dầm đua ra -->
    <path d="M 300 280 L 450 200 L 450 150 L 300 230 Z" stroke-width="0.5" />
    <path d="M 550 200 L 700 280 L 700 230 L 550 150 Z" stroke-width="0.5" />
    
    <!-- Các đường nét đứt biểu diễn các trục khuất -->
    <line x1="500" y1="-200" x2="500" y2="1200" stroke-width="0.5" stroke-dasharray="10 10" opacity="0.5"/>
    <line x1="-100" y1="200" x2="1100" y2="200" stroke-width="0.3" stroke-dasharray="5 5" opacity="0.3"/>
    <line x1="-100" y1="400" x2="1100" y2="400" stroke-width="0.3" stroke-dasharray="5 5" opacity="0.3"/>
    <line x1="-100" y1="600" x2="1100" y2="600" stroke-width="0.3" stroke-dasharray="5 5" opacity="0.3"/>
    <line x1="-100" y1="800" x2="1100" y2="800" stroke-width="0.3" stroke-dasharray="5 5" opacity="0.3"/>
  </g>
  
  <!-- Các điểm nhấn giao điểm (Cross markers) -->
  <g stroke="#D3AE3E" stroke-width="0.5" opacity="0.3">
    <path d="M 445 200 L 455 200 M 450 195 L 450 205" />
    <path d="M 545 200 L 555 200 M 550 195 L 550 205" />
    <path d="M 445 400 L 455 400 M 450 395 L 450 405" />
    <path d="M 545 400 L 555 400 M 550 395 L 550 405" />
  </g>
</svg>
